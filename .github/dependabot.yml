# Low-noise setup: monthly schedule, and every ecosystem's updates are collapsed
# into a SINGLE grouped pull request. Security fixes are handled separately by
# Dependabot security updates (repo Settings → Code security), which still open
# their own PRs as soon as a vulnerability is detected — independent of this schedule.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "monthly"
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "monthly"
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      all:
        patterns: ["*"]
