name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: tooling — install (Prettier + ESLint)
        run: npm ci

      - name: format:check
        run: npm run format:check

      - name: lint
        run: npm run lint

      - name: server — install, typecheck
        working-directory: server
        run: |
          npm ci
          npx tsc --noEmit

      - name: web — install, build
        working-directory: web
        run: |
          npm ci
          npm run build
